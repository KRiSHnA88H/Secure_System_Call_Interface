<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Syscall Interface</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
}

/* HEADER */
h1 {
    margin: 20px;
    font-size: 28px;
    letter-spacing: 1px;
}

/* CONTAINER */
.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 15px;
    padding: 20px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
    animation: fadeIn 0.6s ease;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* OUTPUT BOX */
pre {
    margin-top: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    height: 120px;
    overflow-y: auto;
    font-size: 14px;
}

/* LOG PANEL */
.logs {
    width: 660px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

</style>
</head>

<body>

<h1>🔐 Secure System Call Interface</h1>

<div class="container">

    <!-- LOGIN -->
    <div class="card">
        <h3>Login</h3>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- SYSCALL -->
    <div class="card">
        <h3>Execute System Call</h3>
        <input id="input" placeholder="e.g. append file.txt Hello world">
        <button onclick="run()">Run</button>
        <pre id="output"></pre>
    </div>

</div>

<!-- LOGS -->
<div class="card logs">
    <h3>📜 System Logs</h3>
    <button onclick="getLogs()">Refresh Logs</button>
    <pre id="logs"></pre>
</div>

<script>
let token = "";

// LOGIN
async function login() {
    const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    });

    const data = await res.json();
    token = data.token;
    alert("✅ Logged in successfully");
}

// RUN SYSCALL
async function run() {
    const parts = input.value.split(" ");
    const action = parts[0];
    const data = parts.slice(1).join(" ");

    const res = await fetch("http://localhost:3000/syscall", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": token
        },
        body: JSON.stringify({ action, data })
    });

    const text = await res.text();
    output.innerText = text;

    getLogs(); // auto refresh logs
}

// FETCH LOGS
async function getLogs() {
    const res = await fetch("http://localhost:3000/logs");
    const text = await res.text();
    logs.innerText = text;
}
</script>

</body>
</html>
